<!--
  Bandeau "Sources officielles" pour Wix
  À coller dans Wix : Ajouter un élément → Intégrer du code → Code personnalisé → Coller ce bloc.

  Icônes hébergées sur : https://github.com/AlexandrePerrault/offiboxdata/tree/icons
  URLs raw : https://raw.githubusercontent.com/AlexandrePerrault/offiboxdata/icons/
-->
<style>
  .offibox-wheel-section {
    background: #5A9094;
    padding: 1.25rem 0;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    border-radius: 16px;
  }
  .offibox-wheel-wrap {
    overflow: hidden;
    mask-image: linear-gradient(to right, transparent 0%, black 12%, black 88%, transparent 100%);
    -webkit-mask-image: linear-gradient(to right, transparent 0%, black 12%, black 88%, transparent 100%);
  }
  .offibox-wheel-track {
    display: flex;
    gap: 2rem;
    width: max-content;
    padding: 0 2rem;
    animation: offibox-wheel-scroll 24s linear infinite;
  }
  .offibox-wheel-track:hover {
    animation-play-state: paused;
  }
  @keyframes offibox-wheel-scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .offibox-wheel-item {
    flex-shrink: 0;
    width: 160px;
    height: 100px;
    border-radius: 8px;
    background: #ffffff;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    background-size: 85%;
    background-repeat: no-repeat;
    background-position: center;
    transition: transform 0.2s;
  }
  .offibox-wheel-item:hover {
    transform: scale(1.05);
  }
</style>
